name: Update Game Launcher

on:
  workflow_dispatch:   # Manual trigger
  schedule:
    - cron: '0 9 * * *'   # Daily at 9am UTC (adjust as needed)

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update launcher (placeholder)
        run: |
          echo "This workflow will be expanded to auto-generate cards from GitHub repos."
          echo "For now it runs successfully on dispatch or schedule."

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto-update launcher cards"
          git push
